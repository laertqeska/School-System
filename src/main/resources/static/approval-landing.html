<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Approval Request</title>
    <link rel="stylesheet" href="/css/approval.css">
</head>
<body>
<div class="container">
    <div class="card">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading approval details...</p>
        </div>

        <div id="error-message" class="error-box" style="display: none;">
            <h2>⚠️ Error</h2>
            <p id="error-text"></p>
        </div>

        <div id="content" style="display: none;">
            <div class="header">
                <h1>Faculty Approval Request</h1>
            </div>

            <div class="faculty-info">
                <h2 id="faculty-name"></h2>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">Code:</span>
                        <span id="faculty-code" class="value"></span>
                    </div>
                    <div class="info-item">
                        <span class="label">School:</span>
                        <span id="school-name" class="value"></span>
                    </div>
                    <div class="info-item">
                        <span class="label">Created by:</span>
                        <span id="created-by" class="value"></span>
                    </div>
                    <div class="info-item">
                        <span class="label">Created on:</span>
                        <span id="created-at" class="value"></span>
                    </div>
                </div>
            </div>

            <div id="action-prompt" class="action-prompt">
                <!-- Will be filled by JS -->
            </div>

            <div class="actions">
                <button id="login-btn" class="btn btn-primary">
                    Login to Continue
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/js/approval-landing.js"></script>
</body>
</html>
